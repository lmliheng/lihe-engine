<!DOCTYPE html>
<html>
<head>
    <title>IndexedDB 存储 JSON 数据示例</title>
</head>
<body>
    <h2>IndexedDB 数据存储示例</h2>
    <button onclick="storeData()">存储数据到 IndexedDB</button>
    <button onclick="readData()">读取数据</button>
    
    <script>
        let db;
        const dbName = "BookmarkDB";
        const storeName = "bookmarks";
        
        // 初始化数据库
        function initDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(dbName, 1);
                
                request.onupgradeneeded = function(event) {
                    db = event.target.result;
                    if (!db.objectStoreNames.contains(storeName)) {
                        const objectStore = db.createObjectStore(storeName, { keyPath: 'name' });
                        objectStore.createIndex('name', 'name', { unique: true });
                        console.log("数据库和对象存储空间创建成功");
                    }
                };
                
                request.onsuccess = function(event) {
                    db = event.target.result;
                    resolve(db);
                };
                
                request.onerror = function(event) {
                    reject(event.target.error);
                };
            });
        }
        
        // 存储数据
        async function storeData() {
            try {
                if (!db) await initDB();
                
                const transaction = db.transaction([storeName], 'readwrite');
                const objectStore = transaction.objectStore(storeName);
                
                const jsonData = {
                    "url": [
                        { "name": "菜鸟教程", "url": "www.runoob.com", "image": "www.runoob.com/favicon.ico" },
                        { "name": "google", "url": "www.google.com", "image": "www.google.com/favicon.ico" },
                        { "name": "微博", "url": "www.weibo.com", "image": "www.weibo.com/favicon.ico" }
                    ]
                };
                
                // 清空现有数据
                
                
                // 添加新数据
                jsonData.url.forEach(item => {
                    objectStore.add(item);
                });
                
                transaction.oncomplete = function() {
                    console.log("数据存储完成");
                    alert("数据已成功存储到 IndexedDB！");
                };
                
                transaction.onerror = function(event) {
                    console.error("存储失败:", event.target.error);
                };
            } catch (error) {
                console.error("操作失败:", error);
            }
        }
        
        // 读取数据
        async function readData() {
            try {
                if (!db) await initDB();
                
                const transaction = db.transaction([storeName], 'readonly');
                const objectStore = transaction.objectStore(storeName);
                const request = objectStore.getAll();
                console.log("读取一个google的数据:", objectStore.get("google"));
                console.log("当前对象存储空间中的数据数量:", objectStore.count());
                request.onsuccess = function(event) {
                    const data = event.target.result;
                    console.log("从 IndexedDB 读取的数据:", data);
                    
                    // 在页面显示数据
                    const output = document.createElement('div');
                    output.innerHTML = '<h3>存储的书签数据：</h3>' +
                        '<ul>' + 
                        data.map(item => 
                            `<li>${item.name}: ${item.url} <img src="https://${item.image}" height="16" width="16"></li>`
                        ).join('') + 
                        '</ul>';
                    document.body.appendChild(output);
                };
            } catch (error) {
                console.error("读取失败:", error);
            }
        }
        
        // 页面加载时初始化数据库
        window.onload = function() {
            initDB().catch(error => {
                console.error("数据库初始化失败:", error);
            });
        };
    </script>
</body>
</html>
